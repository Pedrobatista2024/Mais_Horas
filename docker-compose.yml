services:
  postgres:
    image: postgres:16
    container_name: mais-horas-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mais_horas
    ports:
      - "5433:5432"
    volumes:
      - mais_horas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mais_horas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mais_horas_pgdata:
