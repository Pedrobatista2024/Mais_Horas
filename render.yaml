databases:
  - name: mais-horas-db
    plan: free
    databaseName: mais_horas
    user: mais_horas

services:
  # ===== Backend (API Node/Express) =====
  - type: web
    name: mais-horas-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PGSSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: mais-horas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false # cole a URL pública da API após o 1º deploy
      - key: WEB_URL
        sync: false # cole a URL do mais-horas-web (usada no QR dos certificados)
      - key: CORS_ORIGIN
        sync: false # cole a URL do mais-horas-web (ex: https://mais-horas-web.onrender.com)

  # ===== Frontend (Vite static site) =====
  - type: web
    name: mais-horas-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false # cole aqui a URL do serviço mais-horas-api (ex: https://mais-horas-api.onrender.com)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
